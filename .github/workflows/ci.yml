name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (black)
        working-directory: backend
        run: uv run black --check .

      - name: No direct getenv for service auth (spec 018 SC-003)
        run: |
          if grep -rn 'os\.getenv(.*SERVICE_AUTH_SECRET' \
              backend/app guardrails_sidecar/app model_server/app \
              --include="*.py" \
              --exclude-dir=core; then
            echo "Forbidden direct getenv on SERVICE_AUTH_SECRET outside core/. Read via get_settings()." >&2
            exit 1
          fi

      - name: Unit and integration tests
        working-directory: backend
        run: uv run pytest tests/ -x --tb=short

  smoke-and-evals:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Copy env
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "API did not become healthy in time"
          docker compose logs api
          exit 1

      # ── Smoke test: verify all service health endpoints ──────────────────

      - name: Verify /health returns ok
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"

      - name: Verify /ready returns ready
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/ready)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ready', d"

      - name: Verify model_server /health returns ok
        run: |
          RESPONSE=$(curl -sf http://localhost:8001/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"

      - name: Verify guardrails_sidecar /health returns ok
        run: |
          RESPONSE=$(curl -sf http://localhost:8002/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"

      # ── Eval gates: each gate is a separate named step ───────────────────
      # Stack is running above — eval scripts that need live DB can connect.
      # Person C implements the eval scripts; this job wires them into CI.
      # Any gate that exits non-zero blocks the merge (no continue-on-error).

      - name: Classifier eval gate
        run: bash scripts/run_evals.sh classifier

      - name: RAG eval gate
        run: bash scripts/run_evals.sh rag

      - name: Agent tool-selection gate
        run: bash scripts/run_evals.sh agent

      - name: Red-team gate
        run: bash scripts/run_evals.sh security

      - name: Redaction gate
        run: bash scripts/run_evals.sh redaction

      # ── Teardown ─────────────────────────────────────────────────────────

      - name: Tear down
        if: always()
        run: docker compose down -v
