name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (black)
        working-directory: backend
        run: black --check .

      - name: Unit tests
        working-directory: backend
        run: pytest tests/ -x --tb=short || true
        # 'true' until real tests exist — remove once tests are committed

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "API did not become healthy in time"
          docker compose logs api
          exit 1

      - name: Verify /health returns ok
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"

      - name: Verify /ready returns ready
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/ready)
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ready', d"

      - name: Tear down
        if: always()
        run: docker compose down -v

