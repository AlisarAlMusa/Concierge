name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (black)
        working-directory: backend
        run: black --check .

      - name: Unit tests
        working-directory: backend
        run: pytest tests/ -x --tb=short || true
        # 'true' until real tests exist — remove once tests are committed

